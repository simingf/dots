# prefix
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# general
set -g mouse on
set -g escape-time 0
set -g history-limit 10000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# status bar
set -g status-position top

# config
bind r source-file ~/.tmux.conf \; display "Config reloaded!"   # r = reload

# splits
bind '\' split-window -h -c "#{pane_current_path}"   # \ ≈ vertical divider
bind '-' split-window -v -c "#{pane_current_path}"   # - = horizontal divider

# pane movement (colemak-dh: mnei = hjkl)
bind m select-pane -L
bind n select-pane -D
bind e select-pane -U
bind i select-pane -R

# window navigation
bind , previous-window   # , = "<" without shift, points left
bind . next-window       # . = ">" without shift, points right

# pane resize (colemak-dh: MNEI = HJKL, capital + repeatable)
bind -r M resize-pane -L 5
bind -r N resize-pane -D 5
bind -r E resize-pane -U 5
bind -r I resize-pane -R 5

# new window inherits cwd (override default 'c')
bind c new-window -c "#{pane_current_path}"   # c = create window
bind C new-session                             # C = Create session (bigger thing)

# sessions
bind s choose-tree -Zs                         # s = switch session
bind S command-prompt -p "New session name:" "new-session -s '%%'"   # S = Start named session

# windows list (zoomed)
bind w choose-tree -Zw                         # w = window list

# kill bindings
bind X kill-window                             # X = X out the whole window
# x = kill-pane is already default             # x = kill just this pane

# swap panes
bind -r "<" swap-pane -D                       # < = push pane backward
bind -r ">" swap-pane -U                       # > = push pane forward

# move window left/right
bind -r "[" swap-window -t -1 \; previous-window   # [ = bracket points left
bind -r "]" swap-window -t +1 \; next-window       # ] = bracket points right

# synchronize panes toggle
bind y setw synchronize-panes \; display "Sync: #{?pane_synchronized,ON,OFF}"   # y = yoke panes together

# clear screen + scrollback
bind C-l send-keys "clear" \; send-keys "Enter" \; clear-history   # C-l = same as terminal clear

# last window / last pane
bind Tab last-window                           # Tab = jump back (like alt-tab)
bind BTab last-pane                            # Shift-Tab = last pane

# paste
bind p paste-buffer                            # p = paste
bind P choose-buffer                           # P = Pick from paste history
