# kitty SSH kitten — global defaults for all hosts

# shell config
copy .zshrc

# tmux config
copy .tmux.conf

# neovim config (init.lua checks NVIM_REMOTE and skips lazy.nvim when set)
copy .config/nvim/init.lua

# set up env vars
env NVIM_REMOTE=1
env EDITOR=nvim
env VISUAL=nvim
env COLORTERM=truecolor
