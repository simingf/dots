# kitty SSH kitten — global defaults for all hosts

# shell config
copy --dest .bashrc ssh-dots/.bashrc
copy --dest .zshrc ssh-dots/.zshrc

# tmux config
copy --dest .tmux.conf dots/.tmux.conf

# neovim config (init.lua checks NVIM_REMOTE and skips lazy.nvim when set)
copy .config/nvim/init.lua

# set up env vars
env NVIM_REMOTE=1
env EDITOR=nvim
env VISUAL=nvim
env COLORTERM=truecolor
